<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Scanner Barang</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f0f2f5;
            padding: 12px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 22px;
            color: #1a1a1a;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            background: #fafafa;
        }

        input:focus {
            outline: none;
            border-color: #3498db;
            background: white;
        }

        input[readonly] {
            background: #f0f0f0;
            color: #555;
        }

        .barcode-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .barcode-wrapper input {
            padding-right: 60px;
        }

        .camera-btn {
            position: absolute;
            right: 8px;
            background: #3498db;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 8px rgba(52,152,219,0.3);
            transition: all 0.2s;
            z-index: 2;
        }

        .camera-btn:active {
            transform: scale(0.95);
            background: #2980b9;
        }

        .camera-btn.active {
            background: #e74c3c;
            box-shadow: 0 4px 8px rgba(231,76,60,0.3);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }

        .btn-primary {
            background: #27ae60;
            color: white;
        }

        .btn-primary:active {
            background: #229954;
        }

        .btn-purple {
            background: #8e44ad;
            color: white;
        }

        .btn-purple:active {
            background: #7d3c98;
        }

        .btn-orange {
            background: #f39c12;
            color: white;
        }

        .btn-orange:active {
            background: #e67e22;
        }

        .btn-red {
            background: #e74c3c;
            color: white;
        }

        .btn-red:active {
            background: #c0392b;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }

        /* Camera Preview */
        .camera-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: black;
            z-index: 1000;
            display: none;
            flex-direction: column;
        }

        .camera-overlay.active {
            display: flex;
        }

        .camera-header {
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1002;
        }

        .camera-header h3 {
            font-size: 16px;
            font-weight: normal;
        }

        .close-camera {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: rgba(255,255,255,0.2);
        }

        #reader {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        #reader video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scan-region {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border: 2px solid #27ae60;
            border-radius: 20px;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
            z-index: 1001;
            pointer-events: none;
        }

        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: #27ae60;
            animation: scan 2s linear infinite;
            box-shadow: 0 0 10px #27ae60;
        }

        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        .camera-footer {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            font-size: 14px;
            z-index: 1002;
            background: rgba(0,0,0,0.7);
            padding: 12px;
            margin: 0 20px;
            border-radius: 30px;
        }

        /* Table */
        .table-container {
            max-height: 300px;
            overflow-y: auto;
            border-radius: 12px;
            border: 1px solid #eee;
            margin-top: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: #2c3e50;
            color: white;
            padding: 10px 6px;
            position: sticky;
            top: 0;
            font-weight: 500;
        }

        td {
            padding: 8px 6px;
            border-bottom: 1px solid #eee;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
        }

        .total-row {
            background: #f8f9fa;
            font-weight: bold;
        }

        .status {
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
            font-size: 14px;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .counter {
            background: #3498db;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Status -->
        <div id="status" class="status"></div>

        <!-- Form Card -->
        <div class="card">
            <h1>
                📦 Scanner Barang
                <span class="counter" id="totalData">0</span>
            </h1>
            
            <div class="form-group">
                <label>👤 User</label>
                <input type="text" id="user" placeholder="Nama user" value="Operator">
            </div>

            <div class="form-group">
                <label>📍 Lokasi</label>
                <input type="text" id="lokasi" placeholder="Lokasi barang" value="Gudang A">
            </div>

            <div class="form-group">
                <label>🔍 Barcode</label>
                <div class="barcode-wrapper">
                    <input type="text" id="barcode" placeholder="Scan atau ketik barcode" autofocus>
                    <button class="camera-btn" id="cameraBtn" onclick="bukaKamera()">📷</button>
                </div>
            </div>

            <div class="form-group">
                <label>📦 Nama Barang</label>
                <input type="text" id="namaBarang" placeholder="Nama barang" readonly>
            </div>

            <div class="form-group">
                <label>📊 Qty System</label>
                <input type="number" id="qtySystem" placeholder="0" readonly>
            </div>

            <div class="form-group">
                <label>✏️ Input Qty</label>
                <input type="number" id="inputQty" placeholder="Masukkan jumlah" min="0">
            </div>

            <button class="btn btn-primary" onclick="tambahData()">➕ Tambah Data</button>
        </div>

        <!-- Action Buttons -->
        <div class="btn-group">
            <button class="btn btn-purple" onclick="downloadExcel()">📥 Download Excel</button>
            <button class="btn btn-orange" onclick="simpanKeSupabase()">💾 Simpan</button>
        </div>
        
        <button class="btn btn-red" onclick="resetData()">🔄 Reset</button>

        <!-- Table Card -->
        <div class="card" style="padding: 15px;">
            <h3 style="margin-bottom: 10px;">📋 Data Tersimpan</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Barcode</th>
                            <th>Nama</th>
                            <th>Qty</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Camera Overlay -->
    <div id="cameraOverlay" class="camera-overlay">
        <div class="camera-header">
            <h3>📷 Arahkan ke Barcode</h3>
            <button class="close-camera" onclick="tutupKamera()">✕</button>
        </div>
        
        <div id="reader"></div>
        
        <div class="scan-region">
            <div class="scan-line"></div>
        </div>
        
        <div class="camera-footer">
            Scan akan otomatis saat barcode terdeteksi
        </div>
    </div>

    <!-- Libraries -->
    <script src="https://unpkg.com/html5-qrcode@2.3.4/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Config
        const SUPABASE_URL = 'https://[PROYEK_ANDA].supabase.co';
        const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
        const TABLE_NAME = 'scanner_barang';

        // Data
        let dataBarang = [];
        let html5QrcodeScanner = null;
        let isScanning = false;

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            updateTable();
            
            // Enter key untuk cari
            document.getElementById('barcode').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') cariBarang();
            });
        });

        // Status
        function showStatus(msg, isSuccess = true) {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = 'status ' + (isSuccess ? 'success' : 'error');
            setTimeout(() => status.className = 'status', 2000);
        }

        // ==================== FUNGSI KAMERA ====================
        
        function bukaKamera() {
            const overlay = document.getElementById('cameraOverlay');
            const btn = document.getElementById('cameraBtn');
            
            overlay.classList.add('active');
            btn.classList.add('active');
            
            // Mulai kamera setelah overlay muncul
            setTimeout(() => {
                startKamera();
            }, 100);
        }

        function tutupKamera() {
            const overlay = document.getElementById('cameraOverlay');
            const btn = document.getElementById('cameraBtn');
            
            overlay.classList.remove('active');
            btn.classList.remove('active');
            
            stopKamera();
        }

        function startKamera() {
            if (isScanning) return;
            
            try {
                // Buat instance scanner
                html5QrcodeScanner = new Html5Qrcode("reader");
                
                // Konfigurasi khusus untuk mobile
                const config = {
                    fps: 10, // FPS scanning
                    qrbox: { width: 250, height: 250 }, // Area scan
                    aspectRatio: 1.0,
                    disableFlip: false, // Support barcode terbalik
                    formatsToSupport: [
                        Html5QrcodeSupportedFormats.EAN_13,
                        Html5QrcodeSupportedFormats.EAN_8,
                        Html5QrcodeSupportedFormats.UPC_A,
                        Html5QrcodeSupportedFormats.UPC_E,
                        Html5QrcodeSupportedFormats.CODE_128,
                        Html5QrcodeSupportedFormats.CODE_39,
                        Html5QrcodeSupportedFormats.CODE_93,
                        Html5QrcodeSupportedFormats.QR_CODE
                    ]
                };

                // Mulai kamera (prioritas kamera belakang)
                html5QrcodeScanner.start(
                    { facingMode: { exact: "environment" } }, // Paksa kamera belakang
                    config,
                    onScanSuccess,
                    onScanError
                ).then(() => {
                    isScanning = true;
                    console.log("Kamera berhasil dimulai");
                }).catch((error) => {
                    // Fallback ke kamera belakang tanpa exact
                    console.log("Fallback ke kamera belakang biasa", error);
                    return html5QrcodeScanner.start(
                        { facingMode: "environment" },
                        config,
                        onScanSuccess,
                        onScanError
                    );
                }).then(() => {
                    isScanning = true;
                }).catch((error) => {
                    // Fallback ke kamera depan jika semua gagal
                    console.log("Fallback ke kamera depan", error);
                    return html5QrcodeScanner.start(
                        { facingMode: "user" },
                        config,
                        onScanSuccess,
                        onScanError
                    );
                }).then(() => {
                    isScanning = true;
                }).catch((error) => {
                    console.error("Gagal total:", error);
                    showStatus("Tidak bisa akses kamera", false);
                    tutupKamera();
                });
                
            } catch (error) {
                console.error("Error kamera:", error);
                showStatus("Gagal inisialisasi kamera", false);
                tutupKamera();
            }
        }

        function stopKamera() {
            if (html5QrcodeScanner && isScanning) {
                html5QrcodeScanner.stop().then(() => {
                    html5QrcodeScanner = null;
                    isScanning = false;
                    
                    // Bersihkan container
                    const reader = document.getElementById('reader');
                    reader.innerHTML = '';
                    
                    console.log("Kamera dimatikan");
                }).catch((error) => {
                    console.error("Gagal matikan kamera:", error);
                });
            }
        }

        // Callback sukses scan
        function onScanSuccess(decodedText, decodedResult) {
            console.log("Barcode terbaca:", decodedText);
            
            // Masukkan ke input
            document.getElementById('barcode').value = decodedText;
            
            // Getar (jika support)
            if (navigator.vibrate) {
                navigator.vibrate(200);
            }
            
            // Notifikasi
            showStatus("Barcode: " + decodedText);
            
            // Tutup kamera
            tutupKamera();
            
            // Cari data barang
            cariBarang();
        }

        // Callback error scan (diabaikan karena akan banyak error)
        function onScanError(errorMessage) {
            // Abaikan error, hanya log di console
            // console.log("Scan error:", errorMessage);
        }

        // ==================== FUNGSI BARANG ====================
        
        function cariBarang() {
            const barcode = document.getElementById('barcode').value.trim();
            
            if (!barcode) {
                showStatus("Masukkan barcode", false);
                return;
            }

            // Data dummy untuk demo
            const database = {
                '8991234567890': { nama: 'Indomie Goreng', qty: 100 },
                '8991234567891': { nama: 'Aqua 600ml', qty: 200 },
                '8991234567892': { nama: 'Beras 5kg', qty: 50 },
                '8991234567893': { nama: 'Gula 1kg', qty: 75 },
                '8991234567894': { nama: 'Minyak 2L', qty: 60 },
                '8991234567895': { nama: 'Kopi Sachet', qty: 500 },
                '8991234567896': { nama: 'Teh Celup', qty: 300 },
                '8991234567897': { nama: 'Susu Kental Manis', qty: 150 },
                '8991234567898': { nama: 'Sabun Mandi', qty: 80 },
                '8991234567899': { nama: 'Shampo', qty: 70 }
            };

            if (database[barcode]) {
                document.getElementById('namaBarang').value = database[barcode].nama;
                document.getElementById('qtySystem').value = database[barcode].qty;
                document.getElementById('inputQty').focus();
                showStatus("Data ditemukan");
            } else {
                document.getElementById('namaBarang').value = 'BARANG BARU';
                document.getElementById('qtySystem').value = '0';
                document.getElementById('inputQty').focus();
                showStatus("Barcode baru", false);
            }
        }

        function tambahData() {
            const user = document.getElementById('user').value.trim() || 'Operator';
            const lokasi = document.getElementById('lokasi').value.trim() || 'Gudang';
            const barcode = document.getElementById('barcode').value.trim();
            const nama = document.getElementById('namaBarang').value.trim() || 'Unknown';
            const qtySystem = parseInt(document.getElementById('qtySystem').value) || 0;
            const inputQty = parseInt(document.getElementById('inputQty').value);

            // Validasi
            if (!barcode) {
                showStatus("Barcode harus diisi", false);
                document.getElementById('barcode').focus();
                return;
            }
            
            if (!inputQty && inputQty !== 0) {
                showStatus("Input Qty harus diisi", false);
                document.getElementById('inputQty').focus();
                return;
            }

            // Simpan data
            dataBarang.push({
                id: Date.now() + Math.random(),
                user: user,
                lokasi: lokasi,
                barcode: barcode,
                namaBarang: nama,
                qtySystem: qtySystem,
                inputQty: inputQty,
                timestamp: new Date().toISOString()
            });

            // Simpan ke localStorage
            saveData();
            
            // Update tabel
            updateTable();
            
            // Reset form scanner
            document.getElementById('barcode').value = '';
            document.getElementById('namaBarang').value = '';
            document.getElementById('qtySystem').value = '';
            document.getElementById('inputQty').value = '';
            document.getElementById('barcode').focus();
            
            showStatus("Data tersimpan");
        }

        function hapusData(id) {
            if (confirm("Hapus data ini?")) {
                dataBarang = dataBarang.filter(item => item.id !== id);
                saveData();
                updateTable();
                showStatus("Data dihapus");
            }
        }

        function resetData() {
            if (confirm("Reset semua data?")) {
                dataBarang = [];
                saveData();
                updateTable();
                document.getElementById('barcode').value = '';
                document.getElementById('namaBarang').value = '';
                document.getElementById('qtySystem').value = '';
                document.getElementById('inputQty').value = '';
                showStatus("Semua data direset");
                
                // Tutup kamera jika terbuka
                if (isScanning) {
                    tutupKamera();
                }
            }
        }

        // Update tabel
        function updateTable() {
            const tbody = document.getElementById('tableBody');
            const totalSpan = document.getElementById('totalData');
            
            totalSpan.textContent = dataBarang.length;

            if (dataBarang.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;">Belum ada data</td></tr>';
                return;
            }

            let html = '';
            let totalQty = 0;

            dataBarang.forEach((item, index) => {
                totalQty += item.inputQty;
                
                html += `<tr>
                    <td>${index + 1}</td>
                    <td>${item.barcode.slice(-8)}</td>
                    <td>${item.namaBarang.substring(0,12)}</td>
                    <td>${item.inputQty}</td>
                    <td><button class="delete-btn" onclick="hapusData(${item.id})">✕</button></td>
                </tr>`;
            });

            html += `<tr class="total-row">
                <td colspan="3">Total</td>
                <td>${totalQty}</td>
                <td></td>
            </tr>`;

            tbody.innerHTML = html;
        }

        // Local Storage
        function saveData() {
            localStorage.setItem('dataScanner', JSON.stringify(dataBarang));
        }

        function loadData() {
            const saved = localStorage.getItem('dataScanner');
            if (saved) {
                try {
                    dataBarang = JSON.parse(saved);
                } catch (e) {
                    dataBarang = [];
                }
            }
        }

        // Download Excel
        function downloadExcel() {
            if (dataBarang.length === 0) {
                showStatus("Tidak ada data", false);
                return;
            }

            let csv = "No,User,Lokasi,Barcode,Nama Barang,Qty System,Input Qty,Waktu\n";
            
            dataBarang.forEach((item, index) => {
                const row = [
                    index + 1,
                    `"${item.user}"`,
                    `"${item.lokasi}"`,
                    `"${item.barcode}"`,
                    `"${item.namaBarang}"`,
                    item.qtySystem,
                    item.inputQty,
                    `"${new Date(item.timestamp).toLocaleString('id-ID')}"`
                ].join(',');
                
                csv += row + "\n";
            });

            // Download
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `scan_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
            
            showStatus("Download selesai");
        }

        // Simpan ke Supabase
        async function simpanKeSupabase() {
            if (dataBarang.length === 0) {
                showStatus("Tidak ada data", false);
                return;
            }

            if (SUPABASE_URL.includes('[PROYEK_ANDA]')) {
                showStatus("Setup Supabase dulu", false);
                return;
            }

            showStatus("Menyimpan...");

            try {
                const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                
                const { error } = await supabase
                    .from(TABLE_NAME)
                    .insert(dataBarang.map(item => ({
                        user: item.user,
                        lokasi: item.lokasi,
                        barcode: item.barcode,
                        nama_barang: item.namaBarang,
                        qty_system: item.qtySystem,
                        input_qty: item.inputQty,
                        timestamp: item.timestamp
                    })));

                if (error) throw error;
                
                showStatus("Tersimpan di Supabase");
                
            } catch (error) {
                console.error("Error:", error);
                showStatus("Gagal simpan", false);
            }
        }
    </script>
</body>
</html>
