<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Scanner Barang - Supabase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f0f2f5;
            padding: 12px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 22px;
            color: #1a1a1a;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            background: #fafafa;
        }

        input:focus {
            outline: none;
            border-color: #3498db;
            background: white;
        }

        input[readonly] {
            background: #f0f0f0;
            color: #333;
        }

        .barcode-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .barcode-wrapper input {
            padding-right: 60px;
        }

        .camera-btn {
            position: absolute;
            right: 8px;
            background: #3498db;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 8px rgba(52,152,219,0.3);
            transition: all 0.2s;
            z-index: 2;
        }

        .camera-btn:active {
            transform: scale(0.95);
            background: #2980b9;
        }

        .camera-btn.active {
            background: #e74c3c;
            box-shadow: 0 4px 8px rgba(231,76,60,0.3);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }

        .btn-primary {
            background: #27ae60;
            color: white;
        }

        .btn-primary:active {
            background: #229954;
        }

        .btn-purple {
            background: #8e44ad;
            color: white;
        }

        .btn-purple:active {
            background: #7d3c98;
        }

        .btn-orange {
            background: #f39c12;
            color: white;
        }

        .btn-orange:active {
            background: #e67e22;
        }

        .btn-red {
            background: #e74c3c;
            color: white;
        }

        .btn-red:active {
            background: #c0392b;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }

        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            background: white;
            padding: 20px 30px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Camera */
        .camera-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: black;
            z-index: 1000;
            display: none;
            flex-direction: column;
        }

        .camera-overlay.active {
            display: flex;
        }

        .camera-header {
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1002;
        }

        .close-camera {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
        }

        #reader {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #reader video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scan-region {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 250px;
            height: 250px;
            border: 2px solid #27ae60;
            border-radius: 20px;
            box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
            z-index: 1001;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #27ae60;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        .camera-footer {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 12px;
            border-radius: 30px;
            z-index: 1002;
        }

        /* Table */
        .table-container {
            max-height: 300px;
            overflow-y: auto;
            border-radius: 12px;
            border: 1px solid #eee;
            margin-top: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: #2c3e50;
            color: white;
            padding: 10px 6px;
            position: sticky;
            top: 0;
        }

        td {
            padding: 8px 6px;
            border-bottom: 1px solid #eee;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
        }

        .total-row {
            background: #f8f9fa;
            font-weight: bold;
        }

        .status {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: none;
            font-size: 14px;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .counter {
            background: #3498db;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Status -->
        <div id="status" class="status"></div>

        <!-- Form Card -->
        <div class="card">
            <h1>
                📦 Scanner Barang
                <span class="counter" id="totalData">0</span>
            </h1>
            
            <div class="form-group">
                <label>👤 User</label>
                <input type="text" id="user" placeholder="Nama user" value="Operator">
            </div>

            <div class="form-group">
                <label>📍 Lokasi</label>
                <input type="text" id="lokasi" placeholder="Lokasi barang" value="Gudang A">
            </div>

            <div class="form-group">
                <label>🔍 Barcode</label>
                <div class="barcode-wrapper">
                    <input type="text" id="barcode" placeholder="Scan atau ketik barcode" autofocus>
                    <button class="camera-btn" id="cameraBtn" onclick="bukaKamera()">📷</button>
                </div>
            </div>

            <div class="form-group">
                <label>📦 Nama Barang</label>
                <input type="text" id="namaBarang" placeholder="Nama barang" readonly>
            </div>

            <div class="form-group">
                <label>📊 Qty System</label>
                <input type="number" id="qtySystem" placeholder="0" readonly>
            </div>

            <div class="form-group">
                <label>✏️ Input Qty</label>
                <input type="number" id="inputQty" placeholder="Masukkan jumlah" min="0">
            </div>

            <button class="btn btn-primary" onclick="tambahData()">➕ Tambah Data</button>
        </div>

        <!-- Action Buttons -->
        <div class="btn-group">
            <button class="btn btn-purple" onclick="downloadExcel()">📥 Download Excel</button>
            <button class="btn btn-orange" onclick="simpanKeSupabase()">💾 Simpan</button>
        </div>
        
        <button class="btn btn-red" onclick="resetData()">🔄 Reset</button>

        <!-- Table Card -->
        <div class="card" style="padding: 15px;">
            <h3 style="margin-bottom: 10px;">📋 Data Tersimpan</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Barcode</th>
                            <th>Nama</th>
                            <th>Qty</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="loading-overlay">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <span id="loadingText">Memuat data...</span>
        </div>
    </div>

    <!-- Camera Overlay -->
    <div id="cameraOverlay" class="camera-overlay">
        <div class="camera-header">
            <h3>📷 Arahkan ke Barcode</h3>
            <button class="close-camera" onclick="tutupKamera()">✕</button>
        </div>
        
        <div id="reader"></div>
        
        <div class="scan-region">
            <div class="scan-line"></div>
        </div>
        
        <div class="camera-footer">
            Scan otomatis saat barcode terdeteksi
        </div>
    </div>

    <!-- Libraries -->
    <script src="https://unpkg.com/html5-qrcode@2.3.4/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ==================== KONFIGURASI ====================
        // GANTI DENGAN CREDENTIALS SUPABASE ANDA
        const SUPABASE_URL = 'https://easlitficfxnbvvscxzy.supabase.co'; // Ganti dengan URL Supabase Anda
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhc2xpdGZpY2Z4bmJ2dnNjeHp5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0ODk0MDYsImV4cCI6MjA4ODA2NTQwNn0.JwerGLeQraaiDCOEZ3mL8-Tg5GgcCOSCnDX_wXH3CKE'; // Ganti dengan Anon Key Anda
        const TABLE_SCANNER = 'scanner_barang'; // Tabel untuk menyimpan hasil scan
        const TABLE_MASTER = 'master_barang'; // Tabel master barang

        // Data
        let dataBarang = [];
        let html5QrcodeScanner = null;
        let isScanning = false;
        let supabaseClient = null;

        // ==================== INISIALISASI ====================
        document.addEventListener('DOMContentLoaded', async () => {
            // Load data dari localStorage
            loadData();
            updateTable();
            
            // Inisialisasi Supabase jika credentials sudah diisi
            if (SUPABASE_URL && !SUPABASE_URL.includes('YOUR_PROJECT') && SUPABASE_ANON_KEY && !SUPABASE_ANON_KEY.includes('YOUR_ANON')) {
                try {
                    supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    console.log('Supabase connected');
                    showStatus('✅ Terhubung ke Supabase', 'info');
                } catch (error) {
                    console.error('Supabase init error:', error);
                    showStatus('⚠️ Gagal konek Supabase', 'error');
                }
            } else {
                console.log('Supabase not configured');
                showStatus('⚠️ Setup Supabase dulu di kode', 'info');
            }
            
            // Enter key untuk cari
            document.getElementById('barcode').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') cariBarang();
            });
        });

        // ==================== FUNGSI LOADING ====================
        function showLoading(text = 'Memuat...') {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loading').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
        }

        // ==================== FUNGSI STATUS ====================
        function showStatus(msg, type = 'success') {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = 'status ' + type;
            
            // Auto hide setelah 3 detik
            setTimeout(() => {
                if (status.classList.contains(type)) {
                    status.className = 'status';
                }
            }, 3000);
        }

        // ==================== FUNGSI KAMERA ====================
        function bukaKamera() {
            const overlay = document.getElementById('cameraOverlay');
            const btn = document.getElementById('cameraBtn');
            
            overlay.classList.add('active');
            btn.classList.add('active');
            
            setTimeout(() => {
                startKamera();
            }, 100);
        }

        function tutupKamera() {
            const overlay = document.getElementById('cameraOverlay');
            const btn = document.getElementById('cameraBtn');
            
            overlay.classList.remove('active');
            btn.classList.remove('active');
            
            stopKamera();
        }

        function startKamera() {
            if (isScanning) return;
            
            try {
                html5QrcodeScanner = new Html5Qrcode("reader");
                
                const config = {
                    fps: 10,
                    qrbox: { width: 250, height: 250 },
                    aspectRatio: 1.0,
                    disableFlip: false,
                    formatsToSupport: [
                        Html5QrcodeSupportedFormats.EAN_13,
                        Html5QrcodeSupportedFormats.EAN_8,
                        Html5QrcodeSupportedFormats.UPC_A,
                        Html5QrcodeSupportedFormats.UPC_E,
                        Html5QrcodeSupportedFormats.CODE_128,
                        Html5QrcodeSupportedFormats.CODE_39,
                        Html5QrcodeSupportedFormats.CODE_93,
                        Html5QrcodeSupportedFormats.QR_CODE
                    ]
                };

                // Coba kamera belakang
                html5QrcodeScanner.start(
                    { facingMode: { exact: "environment" } },
                    config,
                    onScanSuccess,
                    onScanError
                ).then(() => {
                    isScanning = true;
                }).catch(() => {
                    // Fallback ke kamera belakang biasa
                    return html5QrcodeScanner.start(
                        { facingMode: "environment" },
                        config,
                        onScanSuccess,
                        onScanError
                    );
                }).then(() => {
                    isScanning = true;
                }).catch((error) => {
                    console.error("Camera error:", error);
                    showStatus("❌ Gagal akses kamera", "error");
                    tutupKamera();
                });
                
            } catch (error) {
                console.error("Camera error:", error);
                showStatus("❌ Error kamera", "error");
                tutupKamera();
            }
        }

        function stopKamera() {
            if (html5QrcodeScanner && isScanning) {
                html5QrcodeScanner.stop().then(() => {
                    html5QrcodeScanner = null;
                    isScanning = false;
                    document.getElementById('reader').innerHTML = '';
                });
            }
        }

        // ==================== FUNGSI SCAN SUKSES ====================
        function onScanSuccess(decodedText) {
            console.log("Barcode:", decodedText);
            
            // Masukkan ke input
            document.getElementById('barcode').value = decodedText;
            
            // Getar
            if (navigator.vibrate) navigator.vibrate(200);
            
            // Tutup kamera
            tutupKamera();
            
            // Langsung cari barang dari Supabase
            cariBarangDariSupabase(decodedText);
        }

        function onScanError(error) {
            // Abaikan error scan
        }

        // ==================== FUNGSI CARI BARANG ====================
        async function cariBarang() {
            const barcode = document.getElementById('barcode').value.trim();
            if (!barcode) {
                showStatus("❌ Masukkan barcode", "error");
                return;
            }
            
            await cariBarangDariSupabase(barcode);
        }

        async function cariBarangDariSupabase(barcode) {
            showLoading("🔍 Mencari barang...");
            
            try {
                // Cek apakah Supabase sudah dikonfigurasi
                if (!supabaseClient) {
                    // Fallback ke data lokal/dummy
                    cariBarangLokal(barcode);
                    hideLoading();
                    return;
                }

                // Cari di tabel master_barang
                const { data, error } = await supabaseClient
                    .from(TABLE_MASTER)
                    .select('*')
                    .eq('barcode', barcode)
                    .maybeSingle(); // Gunakan maybeSingle agar tidak error jika tidak ditemukan

                if (error) throw error;

                if (data) {
                    // Data ditemukan di Supabase
                    document.getElementById('namaBarang').value = data.nama_barang || data.nama || 'Unknown';
                    document.getElementById('qtySystem').value = data.stok || data.qty || 0;
                    document.getElementById('inputQty').focus();
                    
                    showStatus(`✅ ${data.nama_barang || data.nama} ditemukan`, "success");
                    
                    // Tampilkan detail di console
                    console.log('Data dari Supabase:', data);
                    
                } else {
                    // Data tidak ditemukan
                    document.getElementById('namaBarang').value = '';
                    document.getElementById('qtySystem').value = '';
                    document.getElementById('inputQty').focus();
                    
                    showStatus(`⚠️ Barcode ${barcode} tidak dikenal`, "error");
                    
                    // Opsional: tanya user untuk buat barang baru
                    if (confirm('Barang tidak ditemukan. Buat data baru?')) {
                        document.getElementById('namaBarang').value = 'BARANG BARU';
                        document.getElementById('qtySystem').value = '0';
                    }
                }
                
            } catch (error) {
                console.error('Error cari barang:', error);
                showStatus("❌ Gagal mengambil data", "error");
                
                // Fallback ke lokal
                cariBarangLokal(barcode);
                
            } finally {
                hideLoading();
            }
        }

        // Fungsi fallback lokal
        function cariBarangLokal(barcode) {
            const database = {
                '8991234567890': { nama: 'Indomie Goreng', qty: 100 },
                '8991234567891': { nama: 'Aqua 600ml', qty: 200 },
                '8991234567892': { nama: 'Beras 5kg', qty: 50 },
                '8991234567893': { nama: 'Gula 1kg', qty: 75 },
                '8991234567894': { nama: 'Minyak 2L', qty: 60 }
            };

            if (database[barcode]) {
                document.getElementById('namaBarang').value = database[barcode].nama;
                document.getElementById('qtySystem').value = database[barcode].qty;
                document.getElementById('inputQty').focus();
                showStatus("✅ Data lokal ditemukan", "success");
            } else {
                document.getElementById('namaBarang').value = '';
                document.getElementById('qtySystem').value = '';
                showStatus("⚠️ Barcode tidak dikenal", "error");
            }
        }

        // ==================== FUNGSI TAMBAH DATA ====================
        function tambahData() {
            const user = document.getElementById('user').value.trim() || 'Operator';
            const lokasi = document.getElementById('lokasi').value.trim() || 'Gudang';
            const barcode = document.getElementById('barcode').value.trim();
            const nama = document.getElementById('namaBarang').value.trim() || 'Unknown';
            const qtySystem = parseInt(document.getElementById('qtySystem').value) || 0;
            const inputQty = parseInt(document.getElementById('inputQty').value);

            // Validasi
            if (!barcode) {
                showStatus("❌ Barcode harus diisi", "error");
                document.getElementById('barcode').focus();
                return;
            }
            
            if (!inputQty && inputQty !== 0) {
                showStatus("❌ Input Qty harus diisi", "error");
                document.getElementById('inputQty').focus();
                return;
            }

            // Simpan data
            const newData = {
                id: Date.now() + Math.random(),
                user: user,
                lokasi: lokasi,
                barcode: barcode,
                namaBarang: nama,
                qtySystem: qtySystem,
                inputQty: inputQty,
                timestamp: new Date().toISOString()
            };

            dataBarang.push(newData);
            saveData();
            updateTable();
            
            // Reset form scanner
            document.getElementById('barcode').value = '';
            document.getElementById('namaBarang').value = '';
            document.getElementById('qtySystem').value = '';
            document.getElementById('inputQty').value = '';
            document.getElementById('barcode').focus();
            
            showStatus("✅ Data tersimpan", "success");
        }

        // ==================== FUNGSI CRUD ====================
        function hapusData(id) {
            if (confirm("Hapus data ini?")) {
                dataBarang = dataBarang.filter(item => item.id !== id);
                saveData();
                updateTable();
                showStatus("✅ Data dihapus", "success");
            }
        }

        function resetData() {
            if (confirm("Reset semua data?")) {
                dataBarang = [];
                saveData();
                updateTable();
                
                document.getElementById('user').value = 'Operator';
                document.getElementById('lokasi').value = 'Gudang A';
                document.getElementById('barcode').value = '';
                document.getElementById('namaBarang').value = '';
                document.getElementById('qtySystem').value = '';
                document.getElementById('inputQty').value = '';
                
                showStatus("✅ Semua data direset", "success");
                
                if (isScanning) tutupKamera();
            }
        }

        // ==================== FUNGSI TABEL ====================
        function updateTable() {
            const tbody = document.getElementById('tableBody');
            const totalSpan = document.getElementById('totalData');
            
            totalSpan.textContent = dataBarang.length;

            if (dataBarang.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;">Belum ada data</td></tr>';
                return;
            }

            let html = '';
            let totalQty = 0;

            dataBarang.forEach((item, index) => {
                totalQty += item.inputQty;
                
                html += `<tr>
                    <td>${index + 1}</td>
                    <td>${item.barcode.slice(-8)}</td>
                    <td>${item.namaBarang.substring(0,12)}</td>
                    <td>${item.inputQty}</td>
                    <td><button class="delete-btn" onclick="hapusData(${item.id})">✕</button></td>
                </tr>`;
            });

            html += `<tr class="total-row">
                <td colspan="3">Total</td>
                <td>${totalQty}</td>
                <td></td>
            </tr>`;

            tbody.innerHTML = html;
        }

        // ==================== FUNGSI LOCAL STORAGE ====================
        function saveData() {
            localStorage.setItem('dataScanner', JSON.stringify(dataBarang));
        }

        function loadData() {
            const saved = localStorage.getItem('dataScanner');
            if (saved) {
                try {
                    dataBarang = JSON.parse(saved);
                } catch (e) {
                    dataBarang = [];
                }
            }
        }

        // ==================== FUNGSI DOWNLOAD EXCEL ====================
        function downloadExcel() {
            if (dataBarang.length === 0) {
                showStatus("❌ Tidak ada data", "error");
                return;
            }

            let csv = "No,User,Lokasi,Barcode,Nama Barang,Qty System,Input Qty,Waktu\n";
            
            dataBarang.forEach((item, index) => {
                const row = [
                    index + 1,
                    `"${item.user}"`,
                    `"${item.lokasi}"`,
                    `"${item.barcode}"`,
                    `"${item.namaBarang}"`,
                    item.qtySystem,
                    item.inputQty,
                    `"${new Date(item.timestamp).toLocaleString('id-ID')}"`
                ].join(',');
                
                csv += row + "\n";
            });

            // Download
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `scan_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
            
            showStatus("✅ Download selesai", "success");
        }

        // ==================== FUNGSI SIMPAN KE SUPABASE ====================
        async function simpanKeSupabase() {
            if (dataBarang.length === 0) {
                showStatus("❌ Tidak ada data", "error");
                return;
            }

            if (!supabaseClient) {
                showStatus("❌ Setup Supabase dulu", "error");
                return;
            }

            showLoading("📤 Menyimpan ke Supabase...");

            try {
                // Siapkan data untuk dikirim
                const dataToInsert = dataBarang.map(item => ({
                    user: item.user,
                    lokasi: item.lokasi,
                    barcode: item.barcode,
                    nama_barang: item.namaBarang,
                    qty_system: item.qtySystem,
                    input_qty: item.inputQty,
                    timestamp: item.timestamp,
                    created_at: new Date().toISOString()
                }));

                // Simpan ke Supabase
                const { data, error } = await supabaseClient
                    .from(TABLE_SCANNER)
                    .insert(dataToInsert);

                if (error) throw error;

                showStatus(`✅ Berhasil simpan ${dataBarang.length} data`, "success");
                
                // Tanya hapus data lokal
                if (confirm('Data berhasil disimpan. Hapus data lokal?')) {
                    dataBarang = [];
                    saveData();
                    updateTable();
                }
                
            } catch (error) {
                console.error('Error simpan ke Supabase:', error);
                showStatus("❌ Gagal simpan: " + error.message, "error");
                
            } finally {
                hideLoading();
            }
        }

        // ==================== FUNGSI TEST ====================
        async function testKoneksiSupabase() {
            if (!supabaseClient) {
                showStatus("❌ Supabase belum dikonfigurasi", "error");
                return;
            }

            showLoading("Testing koneksi...");

            try {
                // Coba ambil 1 data dari master
                const { data, error } = await supabaseClient
                    .from(TABLE_MASTER)
                    .select('*')
                    .limit(1);

                if (error) throw error;

                if (data && data.length > 0) {
                    showStatus(`✅ Terkoneksi, contoh: ${data[0].nama_barang}`, "success");
                } else {
                    showStatus("✅ Terkoneksi, tapi tabel master kosong", "info");
                }
                
            } catch (error) {
                console.error('Test error:', error);
                showStatus("❌ Gagal konek: " + error.message, "error");
                
            } finally {
                hideLoading();
            }
        }
    </script>
</body>
